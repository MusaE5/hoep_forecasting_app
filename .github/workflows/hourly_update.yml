name: HOEP Hourly Updater  # Only name changed (cosmetic)
on:
  schedule:
    - cron: "40 * * * *"   # IDENTICAL
  workflow_dispatch: {}    # Changed to explicit empty object (functionally same)

jobs:
  run-hourly:              # Changed to update-data (cosmetic)
    runs-on: ubuntu-latest
    permissions:
      contents: write      # IDENTICAL
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:              # ONLY ADDITION:
          fetch-depth: 0   # Fixes potential git history issues
        
      - name: Set up Python # IDENTICAL (just formatted cleaner)
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
        
      # REMOVED: Cache steps (non-critical optimization)
      
      - name: Install dependencies # IDENTICAL (simplified formatting)
        run: |
          pip install -r requirements.txt
          
      - name: Run live prediction script # IDENTICAL (env preserved)
        env:
          TZ: America/Toronto
        run: python live_prediction.py
        
      - name: Commit and push updated CSVs # LOGIC PRESERVED WITH 2 IMPROVEMENTS:
        env:
          TZ: America/Toronto
        run: |
          git config --global user.name "github-actions[bot]"  # Changed to --global
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git checkout -b data-updates 2>/dev/null || git checkout data-updates
          git merge main --no-edit || echo "No merge needed"
          git add data/*.csv
          git commit -m "Data update: $(date +"%Y-%m-%d %H:%M:%S %Z")" || echo "No changes to commit"
          git push origin data-updates --force  # YOUR ORIGINAL FORCE PUSH REMAINS

      # ADDED: Verification step (non-breaking)
      - name: Verify push succeeded
        run: git ls-remote --heads origin data-updates
